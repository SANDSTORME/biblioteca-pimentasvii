<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca Pimentas VII</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Biblioteca Pimentas VII: catálogo, empréstimos, sugestões de leitura e suporte em uma plataforma escolar elegante."
    />
    <meta
      name="keywords"
      content="biblioteca escolar, catalogo digital, emprestimos, leitura, professores, alunos, Biblioteca Pimentas VII"
    />
    <meta name="author" content="Biblioteca Pimentas VII" />
    <meta name="theme-color" content="#0d1111" />
    <link rel="icon" type="image/svg+xml" href="/brand/logo-biblioteca-pimentas-vii-v4.svg" />
    <link rel="icon" type="image/png" href="/brand/logo-biblioteca-pimentas-vii.png" />
    <link rel="alternate icon" type="image/webp" href="/brand/logo-biblioteca-pimentas-vii.webp" />
    <link rel="apple-touch-icon" href="/brand/logo-biblioteca-pimentas-vii.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Biblioteca Pimentas VII" />
    <meta
      property="og:description"
      content="Uma biblioteca escolar digital com experiência premium para alunos, professores e administração."
    />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image" content="/brand/logo-biblioteca-pimentas-vii.png" />
    <meta property="og:image:alt" content="Logo da Biblioteca Pimentas VII" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Biblioteca Pimentas VII" />
    <meta
      name="twitter:description"
      content="Catálogo, empréstimos, recomendações e suporte em uma plataforma visualmente marcante."
    />
    <meta name="twitter:image" content="/brand/logo-biblioteca-pimentas-vii.png" />
    <meta name="twitter:image:alt" content="Logo da Biblioteca Pimentas VII" />
    <script>
      (function () {
        var key = 'biblioteca-pimentasvii:theme';
        var root = document.documentElement;
        var storedTheme = null;
        var isAutomation = false;

        try {
          storedTheme = window.localStorage.getItem(key);
        } catch (error) {
          storedTheme = null;
        }

        try {
          isAutomation = !!window.navigator.webdriver;
        } catch (error) {
          isAutomation = false;
        }

        var theme = storedTheme === 'light' ? 'light' : 'dark';
        root.classList.remove('light', 'dark');
        root.classList.add(theme);
        root.style.colorScheme = theme;

        if (isAutomation) {
          root.dataset.automation = 'true';
        }

        var themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', theme === 'dark' ? '#0d1111' : '#f4ecdd');
        }
      })();
    </script>
    <style>
      body.splash-active {
        overflow: hidden;
      }

      html[data-automation='true'] body.splash-active {
        overflow: auto;
      }

      html[data-automation='true'] #boot-splash {
        display: none !important;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 22%, rgba(224, 188, 97, 0.18), transparent 30%),
          radial-gradient(circle at 82% 16%, rgba(74, 156, 129, 0.18), transparent 28%),
          radial-gradient(circle at 50% 82%, rgba(77, 139, 165, 0.12), transparent 34%),
          linear-gradient(180deg, #0d1617 0%, #091011 100%);
        font-family: 'Sora', system-ui, sans-serif;
      }

      html.light #boot-splash {
        background:
          radial-gradient(circle at 20% 22%, rgba(224, 188, 97, 0.18), transparent 30%),
          radial-gradient(circle at 82% 16%, rgba(74, 156, 129, 0.15), transparent 28%),
          radial-gradient(circle at 50% 82%, rgba(77, 139, 165, 0.1), transparent 34%),
          linear-gradient(180deg, #f6f0e5 0%, #ece1cf 100%);
      }

      #boot-splash-card {
        width: min(92vw, 33rem);
        padding: 1.5rem;
        border-radius: 2rem;
        border: 1px solid rgba(189, 166, 112, 0.24);
        background: rgba(16, 25, 26, 0.76);
        box-shadow: 0 30px 90px -36px rgba(0, 0, 0, 0.88);
        backdrop-filter: blur(20px);
        text-align: center;
      }

      html.light #boot-splash-card {
        background: rgba(255, 251, 244, 0.8);
        box-shadow: 0 30px 90px -36px rgba(37, 53, 55, 0.22);
      }

      #boot-splash-logo {
        width: clamp(9.5rem, 28vw, 13rem);
        height: clamp(9.5rem, 28vw, 13rem);
        display: block;
        margin: 0 auto;
        border-radius: 1.35rem;
        object-fit: cover;
        animation: bootSplashFloat 2.8s ease-in-out infinite;
      }

      #boot-splash-kicker {
        margin-top: 1.2rem;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: rgba(219, 209, 184, 0.8);
      }

      html.light #boot-splash-kicker {
        color: rgba(44, 55, 57, 0.76);
      }

      #boot-splash-title {
        margin: 0.8rem 0 0;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: clamp(2.35rem, 6vw, 3.4rem);
        line-height: 0.96;
        color: #f3ead8;
      }

      html.light #boot-splash-title {
        color: #192325;
      }

      #boot-splash-subtitle {
        margin: 0.85rem auto 0;
        max-width: 26rem;
        font-size: 0.95rem;
        line-height: 1.8;
        color: rgba(219, 209, 184, 0.76);
      }

      html.light #boot-splash-subtitle {
        color: rgba(44, 55, 57, 0.72);
      }

      #boot-splash-loader {
        width: min(100%, 14rem);
        height: 0.38rem;
        margin: 1.35rem auto 0;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(123, 110, 82, 0.3);
      }

      #boot-splash-loader span {
        display: block;
        height: 100%;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(135deg, #efcf83 0%, #d6ae49 42%, #db8f58 100%);
        animation: bootSplashLoader 1.2s ease-in-out infinite;
      }

      @keyframes bootSplashFloat {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-8px) scale(1.015);
        }
      }

      @keyframes bootSplashLoader {
        0% {
          transform: translateX(-135%);
        }
        100% {
          transform: translateX(340%);
        }
      }
    </style>
  </head>

  <body class="splash-active">
    <div id="boot-splash" aria-hidden="true">
      <div id="boot-splash-card">
        <img
          id="boot-splash-logo"
          src="/brand/logo-biblioteca-pimentas-vii-v4.svg"
          alt="Logo da Biblioteca Pimentas VII"
        />
        <p id="boot-splash-kicker">Biblioteca escolar</p>
        <h1 id="boot-splash-title">Biblioteca Pimentas VII</h1>
        <p id="boot-splash-subtitle">Leitura, organização e identidade digital para a escola.</p>
        <div id="boot-splash-loader"><span></span></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
