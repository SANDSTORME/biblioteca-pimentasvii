databases:
  - name: biblioteca-pimentas-vii-db
    databaseName: biblioteca_pimentas_vii
    user: biblioteca_pimentas_vii

services:
  - type: web
    name: biblioteca-pimentas-vii
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: biblioteca-pimentas-vii-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_POOL_MAX
        value: 30
      - key: TRUST_PROXY
        value: true
      - key: PUBLIC_CACHE_TTL_SECONDS
        value: 20
      - key: API_RATE_LIMIT_PER_MINUTE
        value: 1200
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        value: 30
      - key: JWT_SECRET
        generateValue: true
      - key: APP_PUBLIC_URL
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
